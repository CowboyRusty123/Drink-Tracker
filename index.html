    /* History */
    .week-card {

    .week-stats { display: flex; justify-content: space-around; text-align: center; }

    .week-lbl { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    .last-drinks-row {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 8px 12px; font-size: 12px;
      color: #f87171; margin-bottom: 5px; text-align: center;
    }
    /* Admin */
    .admin-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .admin-tab {
      background: #1e2a3a; border: 1px solid #2a3a50; border-radius: 20px;
      padding: 5px 12px; font-size: 13px; color: #aaa;
    }
    .admin-tab.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.1); }
    .admin-row {
      display: flex; align-items: center; gap: 10px; background: #161e2e;
      border-radius: 12px; padding: 11px 12px; margin-bottom: 8px; border: 1px solid #1e2a3a;
    }
    .price-box {
      display: flex; align-items: center; background: #0a0d14;
      border: 1px solid #2a3a50; border-radius: 8px; padding: 5px 8px;
    }
    .price-input {
      background: transparent; border: none; color: #f0f0f0;
      font-size: 15px; font-weight: bold; width: 55px; outline: none;
    }
    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px;

      width: 100%; max-width: 340px; border: 1px solid #2a3a50;

    .err-text { color: #f87171; font-size: 12px; text-align: center; margin-top: 4px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
    .empty { text-align: center; color: #444; padding: 60px 20px; font-size: 14px; line-height: 2; }
    .member-add-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .member-add-btn {
      background: #f59e0b; border: none; border-radius: 10px;
      padding: 10px 16px; font-weight: bold; color: #000; font-size: 14px; white-space: nowrap;
    }
    .bottom-bar { padding: 8px 14px; border-top: 1px solid #1e2a3a; }

      background: transparent; border: 1px solid #ef4444; color: #ef4444;
      border-radius: 8px; padding: 4px 10px; font-size: 11px;

<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDKNedtyqAAl6iGwk0ThhnaPLKw17XuxPM",
  authDomain: "drink-tracker-3e11c.firebaseapp.com",
  databaseURL: "https://drink-tracker-3e11c-default-rtdb.firebaseio.com",
  projectId: "drink-tracker-3e11c",
  storageBucket: "drink-tracker-3e11c.firebasestorage.app",
  messagingSenderId: "27005216782",
  appId: "1:27005216782:web:9bebbfe9cfe13925baf45f"
};

// ── DRINKS ───────────────────────────────────────────────────────────────────
const DEFAULT_DRINKS = [
  { id:"hahn",       name:"Hahn Super Dry",  emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:114, std:1.2, color:"#C8102E" },
  { id:"tooheysnew", name:"Tooheys New",      emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:120, std:1.2, color:"#003087" },
  { id:"tooheyold",  name:"Tooheys Old",      emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:125, std:1.2, color:"#8B4513" },
  { id:"vb",         name:"VB",               emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:118, std:1.2, color:"#DAA520" },
  { id:"xxxx",       name:"XXXX Gold",        emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:116, std:1.2, color:"#F4A300" },
  { id:"jimbeam",    name:"Jim Beam Cola",    emoji:"🥃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:228, std:1.5, color:"#BF0000" },
  { id:"rumcola",    name:"Rum & Cola",       emoji:"🧃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:210, std:1.5, color:"#8B4513" },
  { id:"scotchudl",  name:"Scotch & Cola",    emoji:"🥃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:220, std:1.5, color:"#A0522D" },
  { id:"scotch7oz",  name:"Scotch & Coke",    emoji:"🥃", size:"7oz Glass",      price:8.00, happyPrice:8.00, calories:130, std:1.0, color:"#6B3A2A" },
];

const HAPPY_DAYS = [5,6,0];
const HAPPY_START = 16;
const HAPPY_END = 18;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function isHappyHour() {
  const n=new Date(), d=n.getDay(), h=n.getHours();
  return HAPPY_DAYS.includes(d) && h>=HAPPY_START && h<HAPPY_END;
}
function fmtMoney(n){ return "$"+Number(n).toFixed(2); }
function fmtClock(t){ return new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function genCode(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(typeof c==="string") e.appendChild(document.createTextNode(c));
    else if(c) e.appendChild(c);
  }
  return e;
}

// ── SOUNDS ────────────────────────────────────────────────────────────────────
function playCowbell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const play=(freq,start,dur,vol=0.4)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="square";o.frequency.value=freq;
      g.gain.setValueAtTime(vol,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
    };
    play(800,0,0.05,0.5);play(600,0.02,0.08,0.4);
    play(800,0.12,0.05,0.4);play(600,0.14,0.08,0.3);
    play(800,0.28,0.05,0.3);play(600,0.30,0.06,0.2);
  }catch{}
}
function playAirhorn(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [233,311,466,554].forEach(freq=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),dist=ctx.createWaveShaper();
      const curve=new Float32Array(256);
      for(let i=0;i<256;i++) curve[i]=i<128?-1:1;
      dist.curve=curve;
      o.connect(dist);dist.connect(g);g.connect(ctx.destination);
      o.type="sawtooth";o.frequency.value=freq;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05);
      g.gain.setValueAtTime(0.3,ctx.currentTime+1.5);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.0);
      o.start();o.stop(ctx.currentTime+2.0);
    });
  }catch{}
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let db, roomCode="", roomData={}, screen="name";
let userName=localStorage.getItem("dt_name")||"";
let isAdmin=false, currentTab="session", adminSection="prices";
let drinks=[...DEFAULT_DRINKS];
let adminPass="Sydneybuses1977";
let stdWarnAt=4, spendWarnAt=50;
let happyHour=isHappyHour(), prevHappy=isHappyHour(), showHappyNotif=false;
let spinning=false, spinResult=null, newMemberInput="";
let nowDate=new Date();
const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

if(userName) screen="home";

// ── FIREBASE ──────────────────────────────────────────────────────────────────
const app=initializeApp(FIREBASE_CONFIG);
db=getDatabase(app);

function subscribeRoom(){
  onValue(ref(db,`rooms/${roomCode}`),snap=>{
    roomData=snap.val()||{};
    render();
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function createRoom(){
  if(!userName.trim()) return;
  roomCode=genCode();
  set(ref(db,`rooms/${roomCode}`),{
    created:Date.now(),
    members:{[userName]:{joinedAt:Date.now(),shoutCount:0}},
    drinkLog:{}, shoutOrder:[userName], currentShout:0, roundCount:0, shoutHistory:{}
  });
  subscribeRoom();
  screen="session"; render();
}
function joinRoom(code){
  if(!userName.trim()||!code.trim()) return;
  roomCode=code.toUpperCase();
  update(ref(db,`rooms/${roomCode}/members/${userName}`),{joinedAt:Date.now(),shoutCount:0});
  subscribeRoom();
  screen="session"; render();
}
function addDrink(drinkId){
  const drink=drinks.find(d=>d.id===drinkId); if(!drink) return;
  const price=happyHour?drink.happyPrice:drink.price;
  push(ref(db,`rooms/${roomCode}/drinkLog`),{
    drinkId,member:userName,timestamp:Date.now(),
    price,calories:drink.calories,std:drink.std,done:false
  });
}
function markDone(key){
  playCowbell();
  const entry=roomData?.drinkLog?.[key];
  update(ref(db,`rooms/${roomCode}/drinkLog/${key}`),{done:!entry?.done});
}
function nextShout(){
  const order=roomData.shoutOrder||[], curr=roomData.currentShout||0;
  const nextIdx=(curr+1)%order.length;
  const shouter=order[curr];
  const newRound=nextIdx===0?(roomData.roundCount||0)+1:(roomData.roundCount||0);
  update(ref(db,`rooms/${roomCode}`),{currentShout:nextIdx,roundCount:newRound});
  update(ref(db,`rooms/${roomCode}/members/${shouter}`),{shoutCount:((roomData.members?.[shouter]?.shoutCount)||0)+1});
  set(ref(db,`rooms/${roomCode}/shoutHistory/${Date.now()}`),{name:shouter,time:Date.now()});
}
function spinForFirst(){
  const order=roomData.shoutOrder||[]; if(order.length<2) return;
  spinning=true; spinResult=null; render();
  let count=0;
  const iv=setInterval(()=>{
    spinResult=order[Math.floor(Math.random()*order.length)];
    count++;
    if(count>20){
      clearInterval(iv);
      const winner=order[Math.floor(Math.random()*order.length)];
      spinResult=winner; spinning=false;
      update(ref(db,`rooms/${roomCode}`),{currentShout:order.indexOf(winner)});
      render();
    } else render();
  },100);
}
function addMember(name){
  if(!name.trim()) return;
  const order=[...(roomData?.shoutOrder||[]),name.trim()];
  update(ref(db,`rooms/${roomCode}/members/${name.trim()}`),{joinedAt:Date.now(),shoutCount:0});
  update(ref(db,`rooms/${roomCode}`),{shoutOrder:order});
}
function removeMember(name){
  const order=(roomData?.shoutOrder||[]).filter(n=>n!==name);
  remove(ref(db,`rooms/${roomCode}/members/${name}`));
  update(ref(db,`rooms/${roomCode}`),{shoutOrder:order});
}
function clearRoom(){
  update(ref(db,`rooms/${roomCode}`),{drinkLog:{},roundCount:0,currentShout:0,shoutHistory:{}});
}
function lastDrinks(){
  playAirhorn();
  push(ref(db,`rooms/${roomCode}/drinkLog`),{
    drinkId:"LASTDRINKS",member:"SYSTEM",timestamp:Date.now(),price:0,calories:0,std:0,done:false
  });
}

// ── COMPUTED ──────────────────────────────────────────────────────────────────
function getLog(){ return roomData?.drinkLog?Object.entries(roomData.drinkLog):[]; }
function getMyLog(){ return getLog().filter(([,e])=>e.member===userName&&e.drinkId!=="LASTDRINKS"); }
function getAllLog(){ return getLog().filter(([,e])=>e.drinkId!=="LASTDRINKS"); }
function totals(log){ return log.reduce((a,[,e])=>({spent:a.spent+e.price,cal:a.cal+e.calories,std:a.std+e.std}),{spent:0,cal:0,std:0}); }
function getShoutHistory(){ return roomData?.shoutHistory?Object.values(roomData.shoutHistory).sort((a,b)=>b.time-a.time):[]; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";

  if(screen==="name") { root.appendChild(renderNameScreen()); return; }
  if(screen==="home") { root.appendChild(renderHomeScreen()); return; }
  root.appendChild(renderMain());
}

function renderNameScreen(){
  const inp=el("input",{class:"input",placeholder:"Your name...",type:"text"});
  const btn=el("button",{class:"btn-gold"},["Let's Go 🍻"]);
  btn.onclick=()=>{
    if(inp.value.trim()){
      userName=inp.value.trim();
      localStorage.setItem("dt_name",userName);
      screen="home"; render();
    }
  };
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") btn.click(); });
  const d=el("div",{class:"gate"},[
    el("div",{class:"gate-beer"},["🍺"]),
    el("div",{class:"gate-title"},["Drink Tracker"]),
    el("div",{class:"gate-sub"},["Enter your name to get started"]),
    inp, btn
  ]);
  setTimeout(()=>inp.focus(),50);
  return d;
}

function renderHomeScreen(){
  const timeStr=nowDate.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const dateStr=`${dayNames[nowDate.getDay()]} ${nowDate.toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})}`;
  const dateEl=el("div",{class:"date-bar"},[dateStr+" · "+timeStr]);
  if(happyHour){ const s=el("span",{class:"happy-badge"},[" 🍺 HAPPY HOUR!"]); dateEl.appendChild(s); }

  const roomInp=el("input",{class:"input",placeholder:"Enter room code...",maxlength:"5",style:{textTransform:"uppercase",marginBottom:"4px"}});
  roomInp.addEventListener("input",()=>roomInp.value=roomInp.value.toUpperCase());

  const createBtn=el("button",{class:"btn-gold"},["+ Create New Session"]);
  createBtn.onclick=createRoom;

  const joinBtn=el("button",{class:"btn-outline"},["Join Session"]);
  joinBtn.onclick=()=>joinRoom(roomInp.value);
  roomInp.addEventListener("keydown",e=>{ if(e.key==="Enter") joinBtn.click(); });

  const changeBtn=el("button",{class:"link-btn"},["Not "+userName+"? Change name"]);
  changeBtn.onclick=()=>{ userName=""; localStorage.removeItem("dt_name"); screen="name"; render(); };

  return el("div",{class:"gate"},[
    el("div",{class:"gate-beer"},["🍺"]),
    el("div",{class:"gate-title"},["Drink Tracker"]),
    el("div",{class:"gate-sub"},["G'day "+userName+"!"]),
    dateEl,
    createBtn,
    el("div",{class:"or-div"},["— or join existing —"]),
    roomInp, joinBtn, changeBtn
  ]);
}

function renderMain(){
  const wrap=el("div",{});

  // Happy hour notif
  if(showHappyNotif){
    const close=el("button",{style:{background:"transparent",border:"none",color:"#6ee7b7",fontSize:"16px"}},["✕"]);
    close.onclick=()=>{ showHappyNotif=false; render(); };
    wrap.appendChild(el("div",{class:"happy-notif"},["🍺 HAPPY HOUR! Beer prices have dropped to $5.50! ",close]));
  }

  // Header
  const timeStr=nowDate.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const dateStr=`${dayNames[nowDate.getDay()]} ${nowDate.toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})}`;
  const gear=el("button",{class:"gear-btn"},["⚙️"]);
  gear.onclick=()=>{
    if(isAdmin){ currentTab="admin"; render(); }
    else renderAdminModal(wrap);
  };
  const headerSub=el("div",{class:"header-sub"},[]);
  const rc=el("span",{class:"room-code"},["#"+roomCode]); headerSub.appendChild(rc);
  headerSub.appendChild(document.createTextNode(" · "+userName));
  if(happyHour){ headerSub.appendChild(el("span",{class:"happy-tag"},[" · 🍺 Happy Hour!"])); }
  wrap.appendChild(el("div",{class:"header"},[
    el("div",{},[el("div",{class:"header-title"},["🍺 Drink Tracker"]),headerSub]),
    el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},[
      el("div",{class:"clock-box"},[
        el("div",{class:"clock-time"},[timeStr]),
        el("div",{class:"clock-date"},[dateStr])
      ]),
      gear
    ])
  ]));

  // Tab bar
  const tabs=["session","shout","history"];
  const tabLabels={"session":"🍺 My Drinks","shout":"🔔 The Shout","history":"📋 History"};
  const tabBar=el("div",{class:"tab-bar"},[]);
  tabs.forEach(t=>{
    const btn=el("button",{class:"tab-btn"+(t===currentTab?" active":"")+(isAdmin&&t==="admin"?" active":""),[`data-tab`]:t},[tabLabels[t]||t]);
    btn.onclick=()=>{ currentTab=t; render(); };
    tabBar.appendChild(btn);
  });
  wrap.appendChild(tabBar);

  // Content
  const page=el("div",{class:"page"},[]);
  if(currentTab==="session") renderSession(page);
  else if(currentTab==="shout") renderShout(page);
  else if(currentTab==="history") renderHistory(page);
  else if(currentTab==="admin"&&isAdmin) renderAdmin(page);
  wrap.appendChild(page);

  // Back button
  const back=el("div",{class:"bottom-bar"},[]);
  const backBtn=el("button",{class:"link-btn"},["← Back to Lobby"]);
  backBtn.onclick=()=>{ screen="home"; roomCode=""; roomData={}; isAdmin=false; render(); };
  back.appendChild(backBtn);
  wrap.appendChild(back);

  return wrap;
}

function renderAdminModal(wrap){
  const inp=el("input",{class:"input",type:"password",placeholder:"Password..."});
  const err=el("div",{class:"err-text",style:{display:"none"}},["Incorrect password"]);
  const cancel=el("button",{class:"btn-outline",style:{flex:"1"}},["Cancel"]);
  const unlock=el("button",{class:"btn-gold",style:{flex:"1"}},["Unlock"]);
  cancel.onclick=()=>{ overlay.remove(); };
  unlock.onclick=()=>{
    if(inp.value===adminPass){ isAdmin=true; overlay.remove(); currentTab="admin"; render(); }
    else { err.style.display="block"; }
  };
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") unlock.click(); });
  const overlay=el("div",{class:"overlay"},[
    el("div",{class:"modal"},[
      el("div",{class:"modal-title"},["⚙️ Admin Access"]),
      inp, err,
      el("div",{class:"modal-btns"},[cancel,unlock])
    ])
  ]);
  wrap.appendChild(overlay);
  setTimeout(()=>inp.focus(),50);
}

function renderSession(page){
  const myLog=getMyLog(), mt=totals(myLog);

  // Stats
  const statRow=el("div",{class:"stat-row"},[]);
  [["Spent",fmtMoney(mt.spent),"#f59e0b"],["Calories",Math.round(mt.cal),"#ef4444"],["Std Drinks",mt.std.toFixed(1),"#3b82f6"],["My Drinks",myLog.length,"#10b981"]].forEach(([l,v,c])=>{
    statRow.appendChild(el("div",{class:"stat-box",style:{borderTop:`3px solid ${c}`}},[
      el("div",{class:"stat-val",style:{color:c}},[String(v)]),
      el("div",{class:"stat-lbl"},[l])
    ]));
  });
  page.appendChild(statRow);

  if(mt.std>=stdWarnAt) page.appendChild(el("div",{class:"warn"},["⚠️ "+mt.std.toFixed(1)+" standard drinks — please be careful"]));
  if(mt.spent>=spendWarnAt) page.appendChild(el("div",{class:"warn"},["💸 You've spent "+fmtMoney(mt.spent)+" tonight"]));
  if(happyHour) page.appendChild(el("div",{class:"happy-bar"},["🍺 Happy Hour — Beers are $5.50!"]));

  page.appendChild(el("div",{class:"section-label"},["TAP TO ADD YOUR DRINK"]));
  drinks.forEach(d=>page.appendChild(makeDrinkBtn(d,()=>addDrink(d.id))));

  if(myLog.length>0){
    page.appendChild(el("div",{class:"section-label"},["MY LOG — TAP 🔔 WHEN FINISHED"]));
    [...myLog].reverse().forEach(([key,e])=>{
      const d=drinks.find(x=>x.id===e.drinkId); if(!d) return;
      page.appendChild(makeLogRow(e,d,null,()=>markDone(key)));
    });
  }

  const lastBtn=el("button",{class:"btn-red"},["📯 LAST DRINKS!"]);
  lastBtn.onclick=lastDrinks;
  page.appendChild(lastBtn);
}

function renderShout(page){
  const allLog=getAllLog(), at=totals(allLog);
  const shoutOrder=roomData?.shoutOrder||[];
  const currentShout=roomData?.currentShout||0;
  const roundCount=roomData?.roundCount||0;

  // Group stats
  const statRow=el("div",{class:"stat-row"},[]);
  [["Group $",fmtMoney(at.spent),"#f59e0b"],["Calories",Math.round(at.cal),"#ef4444"],["Rounds",roundCount,"#a78bfa"],["Drinks",allLog.length,"#10b981"]].forEach(([l,v,c])=>{
    statRow.appendChild(el("div",{class:"stat-box",style:{borderTop:`3px solid ${c}`}},[
      el("div",{class:"stat-val",style:{color:c}},[String(v)]),
      el("div",{class:"stat-lbl"},[l])
    ]));
  });
  page.appendChild(statRow);

  // Current shout
  if(shoutOrder.length>0){
    const nextBtn=el("button",{class:"next-btn"},["Next →"]);
    nextBtn.onclick=nextShout;
    page.appendChild(el("div",{class:"shout-banner"},[
      el("div",{},[
        el("div",{class:"shout-who"},["🔔 "+shoutOrder[currentShout]+"'s shout!"]),
        el("div",{class:"shout-round"},["Round "+(roundCount+1)])
      ]),
      nextBtn
    ]));
  }

  // Spin
  if(shoutOrder.length>1){
    const spinBtn=el("button",{class:"spin-btn"},[spinning?"🎲 "+spinResult+"...":"🎲 Spin for First Shout!"]);
    spinBtn.onclick=spinForFirst;
    spinBtn.disabled=spinning;
    const spinBox=el("div",{class:"spin-box"},[spinBtn]);
    if(spinResult&&!spinning) spinBox.appendChild(el("div",{class:"spin-result"},["🎉 "+spinResult+" goes first!"]));
    page.appendChild(spinBox);
  }

  // Add members
  page.appendChild(el("div",{class:"section-label"},["WHO'S IN THE SHOUT?"]));
  const memberInp=el("input",{class:"input",placeholder:"Add member...",style:{flex:"1",marginBottom:"0",padding:"10px 12px"}});
  memberInp.value=newMemberInput;
  memberInp.addEventListener("input",()=>newMemberInput=memberInp.value);
  const addBtn=el("button",{class:"member-add-btn"},["+ Add"]);
  addBtn.onclick=()=>{ addMember(memberInp.value); memberInp.value=""; newMemberInput=""; };
  memberInp.addEventListener("keydown",e=>{ if(e.key==="Enter") addBtn.click(); });
  page.appendChild(el("div",{class:"member-add-row"},[memberInp,addBtn]));

  // Chips
  const chips=el("div",{class:"chips"},[]);
  shoutOrder.forEach((m,i)=>{
    const chip=el("div",{class:"chip"+(i===currentShout?" active":"")},[m]);
    if(isAdmin){
      const x=el("span",{class:"chip-x"},["×"]);
      x.onclick=()=>removeMember(m);
      chip.appendChild(x);
    }
    chips.appendChild(chip);
  });
  page.appendChild(chips);

  // Shout history
  const hist=getShoutHistory();
  if(hist.length>0){
    page.appendChild(el("div",{class:"section-label"},["SHOUT HISTORY"]));
    const histEl=el("div",{class:"shout-hist"},[]);
    hist.slice(0,10).forEach(h=>{
      histEl.appendChild(el("div",{class:"shout-hist-row"},[
        el("span",{style:{color:"#f59e0b"}},[h.name]),
        el("span",{style:{fontSize:"11px",color:"#555"}},[fmtClock(h.time)])
      ]));
    });
    page.appendChild(histEl);
  }

  // Group log
  if(allLog.length>0){
    page.appendChild(el("div",{class:"section-label"},["GROUP LOG — TAP 🔔 WHEN FINISHED"]));
    [...allLog].reverse().forEach(([key,e])=>{
      const d=drinks.find(x=>x.id===e.drinkId); if(!d) return;
      page.appendChild(makeLogRow(e,d,e.member,()=>markDone(key)));
    });
  }

  const lastBtn=el("button",{class:"btn-red"},["📯 LAST DRINKS!"]);
  lastBtn.onclick=lastDrinks;
  page.appendChild(lastBtn);
}

function renderHistory(page){
  const log=getLog();
  if(log.length===0){ page.appendChild(el("div",{class:"empty"},["No drinks logged yet this session."])); return; }
  page.appendChild(el("div",{class:"section-label"},["THIS SESSION — ALL DRINKS"]));
  [...log].reverse().forEach(([key,e])=>{
    if(e.drinkId==="LASTDRINKS"){
      page.appendChild(el("div",{class:"last-drinks-row"},["📯 LAST DRINKS called at "+fmtClock(e.timestamp)]));
      return;
    }
    const d=drinks.find(x=>x.id===e.drinkId); if(!d) return;
    page.appendChild(makeLogRow(e,d,e.member,null,true));
  });
  if(isAdmin){
    const clr=el("button",{class:"btn-outline",style:{marginTop:"16px",color:"#ef4444",borderColor:"#ef4444"}},["🗑 Clear Session History"]);
    clr.onclick=clearRoom;
    page.appendChild(clr);
  }
}

function renderAdmin(page){
  page.appendChild(el("div",{style:{fontSize:"18px",fontWeight:"bold",color:"#f59e0b",marginBottom:"14px"}},["⚙️ Admin Panel"]));

  const secs=[["prices","💰 Prices"],["happyhour","🍺 Happy Hour"],["warnings","⚠️ Warnings"],["members","👥 Members"],["password","🔒 Password"]];
  const tabsEl=el("div",{class:"admin-tabs"},[]);
  secs.forEach(([k,label])=>{
    const b=el("button",{class:"admin-tab"+(adminSection===k?" active":"")},[ label]);
    b.onclick=()=>{ adminSection=k; render(); };
    tabsEl.appendChild(b);
  });
  page.appendChild(tabsEl);

  if(adminSection==="prices"){
    drinks.forEach(d=>{
      const inp=el("input",{type:"number",step:"0.10",min:"0",class:"price-input"});
      inp.value=d.price;
      inp.addEventListener("change",()=>{ d.price=parseFloat(inp.value)||0; });
      page.appendChild(el("div",{class:"admin-row"},[
        el("span",{style:{fontSize:"20px"}},[d.emoji]),
        el("div",{style:{flex:"1"}},[
          el("div",{style:{fontSize:"13px",fontWeight:"bold",color:d.color}},[d.name]),
          el("div",{style:{fontSize:"10px",color:"#555"}},[d.size])
        ]),
        el("div",{class:"price-box"},[el("span",{style:{color:"#f59e0b",fontWeight:"bold"}},["$"]),inp])
      ]));
    });
  }

  if(adminSection==="happyhour"){
    page.appendChild(el("div",{class:"section-label"},["HAPPY HOUR BEER PRICES"]));
    drinks.filter(d=>["hahn","tooheysnew","tooheyold","vb","xxxx"].includes(d.id)).forEach(d=>{
      const inp=el("input",{type:"number",step:"0.10",min:"0",class:"price-input"});
      inp.value=d.happyPrice;
      inp.addEventListener("change",()=>{ d.happyPrice=parseFloat(inp.value)||0; });
      page.appendChild(el("div",{class:"admin-row"},[
        el("span",{style:{fontSize:"20px"}},[d.emoji]),
        el("div",{style:{flex:"1"}},[el("div",{style:{fontSize:"13px",fontWeight:"bold",color:d.color}},[d.name])]),
        el("div",{class:"price-box"},[el("span",{style:{color:"#10b981",fontWeight:"bold"}},["$"]),inp])
      ]));
    });
  }

  if(adminSection==="warnings"){
    page.appendChild(el("div",{class:"section-label"},["STD DRINKS WARNING"]));
    const si=el("input",{type:"number",min:"1",max:"20",class:"price-input",style:{width:"60px",background:"#161e2e",border:"1px solid #2a3a50",borderRadius:"8px",padding:"6px 10px"}});
    si.value=stdWarnAt;
    si.addEventListener("change",()=>{ stdWarnAt=parseInt(si.value)||4; });
    page.appendChild(el("div",{class:"admin-row"},[el("span",{style:{flex:"1",color:"#aaa"}},["Warn after std drinks:"]),si]));

    page.appendChild(el("div",{class:"section-label"},["SPENDING WARNING"]));
    const sp=el("input",{type:"number",min:"1",class:"price-input",style:{width:"60px",background:"#161e2e",border:"1px solid #2a3a50",borderRadius:"8px",padding:"6px 10px"}});
    sp.value=spendWarnAt;
    sp.addEventListener("change",()=>{ spendWarnAt=parseInt(sp.value)||50; });
    page.appendChild(el("div",{class:"admin-row"},[el("span",{style:{flex:"1",color:"#aaa"}},["Warn after spending $:"]),sp]));

    const lastBtn=el("button",{class:"btn-red"},["📯 Trigger Last Drinks Now"]);
    lastBtn.onclick=lastDrinks;
    page.appendChild(lastBtn);
  }

  if(adminSection==="members"){
    page.appendChild(el("div",{class:"section-label"},["REMOVE MEMBERS"]));
    (roomData?.shoutOrder||[]).forEach(m=>{
      const rmv=el("button",{class:"remove-btn"},["Remove"]);
      rmv.onclick=()=>removeMember(m);
      page.appendChild(el("div",{class:"admin-row"},[
        el("span",{style:{flex:"1",color:"#f0f0f0"}},["👤 "+m]),rmv
      ]));
    });
    page.appendChild(el("div",{class:"section-label"},["SESSION"]));
    const clr=el("button",{class:"btn-outline",style:{marginBottom:"8px"}},["🗑 Clear All Drink History"]);
    clr.onclick=clearRoom; page.appendChild(clr);
    const leave=el("button",{class:"btn-outline"},["🚪 Leave Session"]);
    leave.onclick=()=>{ screen="home"; roomCode=""; roomData={}; isAdmin=false; render(); };
    page.appendChild(leave);
  }

  if(adminSection==="password"){
    page.appendChild(el("div",{class:"section-label"},["CHANGE ADMIN PASSWORD"]));
    const inp=el("input",{type:"password",class:"input",placeholder:"New password..."});
    const btn=el("button",{class:"btn-gold"},["Update Password"]);
    btn.onclick=()=>{ if(inp.value.trim()){ adminPass=inp.value.trim(); inp.value=""; alert("Password updated!"); }};
    page.appendChild(inp); page.appendChild(btn);
  }

  const lock=el("button",{class:"btn-outline",style:{marginTop:"20px",color:"#ef4444",borderColor:"#333"}},["🔒 Lock Admin"]);
  lock.onclick=()=>{ isAdmin=false; currentTab="session"; render(); };
  page.appendChild(lock);
}

function makeDrinkBtn(d, onClick){
  const price=happyHour?d.happyPrice:d.price;
  const priceEl=el("div",{style:{textAlign:"right"}},[
    el("div",{style:{fontSize:"16px",fontWeight:"bold",color:(happyHour&&d.happyPrice<d.price)?"#10b981":"#f0f0f0"}},[fmtMoney(price)])
  ]);
  if(happyHour&&d.happyPrice<d.price){
    priceEl.appendChild(el("div",{style:{fontSize:"10px",color:"#555",textDecoration:"line-through"}},[fmtMoney(d.price)]));
  }
  const btn=el("div",{class:"drink-btn",style:{background:`linear-gradient(135deg,${d.color}33,${d.color}11)`,borderColor:d.color,gap:"10px",cursor:"pointer"}},[
    el("span",{class:"drink-emoji"},[d.emoji]),
    el("div",{class:"drink-mid"},[
      el("span",{class:"drink-name",style:{color:d.color}},[d.name]),
      el("span",{class:"drink-sub"},[d.size+" · "+d.calories+" cal · "+d.std+" std"])
    ]),
    priceEl
  ]);
  btn.onclick=onClick;
  return btn;
}

function makeLogRow(e,d,member,onBell,showMember){
  const nameEl=el("div",{class:"log-name"+(e.done?" done":""),style:{color:d.color}},[d.name]);
  if(member||showMember) nameEl.appendChild(el("span",{class:"log-member"},[member||""]));
  const row=el("div",{class:"log-row"+(e.done?" done":"")},[
    el("span",{class:"log-emoji"},[d.emoji]),
    nameEl,
    el("span",{class:"log-time"},[fmtClock(e.timestamp)]),
    el("span",{class:"log-price"},[fmtMoney(e.price)])
  ]);
  if(onBell){
    const bell=el("button",{class:"bell-btn"},[e.done?"✅":"🔔"]);
    bell.onclick=onBell;
    row.appendChild(bell);
  }
  return row;
}

// ── CLOCK + HAPPY HOUR ────────────────────────────────────────────────────────
setInterval(()=>{
  nowDate=new Date();
  const happy=isHappyHour();
  if(happy&&!prevHappy){ showHappyNotif=true; }
  prevHappy=happy; happyHour=happy;
  if(screen==="session") render();
},10000);

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
