    .price-popup { background: #fff; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 14px; }

    .price-popup-input { width: 70px; background: transparent; border: none; font-size: 20px; font-weight: bold; color: #1a1a2e; outline: none; text-align: right; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDKNedtyqAAl6iGwk0ThhnaPLKw17XuxPM",
  authDomain: "drink-tracker-3e11c.firebaseapp.com",

const DEFAULT_DRINKS = [
  { id:"hahn",       name:"Hahn Super Dry",  emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:114, std:1.2, color:"#C8102E" },
  { id:"tooheysnew", name:"Tooheys New",      emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:120, std:1.2, color:"#003087" },
  { id:"tooheyold",  name:"Tooheys Old",      emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:125, std:1.2, color:"#8B4513" },
  { id:"vb",         name:"VB",               emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:118, std:1.2, color:"#c8960c" },
  { id:"xxxx",       name:"XXXX Gold",        emoji:"🍺", size:"Schooner 425ml", price:7.60, happyPrice:5.50, calories:116, std:1.2, color:"#b45309" },
  { id:"jimbeam",    name:"Jim Beam Cola",    emoji:"🥃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:228, std:1.5, color:"#991b1b" },
  { id:"rumcola",    name:"Rum & Cola",       emoji:"🧃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:210, std:1.5, color:"#92400e" },
  { id:"scotchudl",  name:"Scotch & Cola",    emoji:"🥃", size:"UDL Can 375ml",  price:9.50, happyPrice:9.50, calories:220, std:1.5, color:"#78350f" },
  { id:"scotch7oz",  name:"Scotch & Coke",    emoji:"🥃", size:"7oz Glass",      price:8.00, happyPrice:8.00, calories:130, std:1.0, color:"#451a03" },
];

const HAPPY_DAYS=[5,6,0], HAPPY_START=16, HAPPY_END=18;
function isHappyHour(){ const n=new Date(); return HAPPY_DAYS.includes(n.getDay())&&n.getHours()>=HAPPY_START&&n.getHours()<HAPPY_END; }
function fmtMoney(n){ return "$"+Number(n).toFixed(2); }
function fmtClock(t){ return new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function genCode(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }

function playCowbell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const play=(freq,start,dur,vol=0.4)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type="square";o.frequency.value=freq; g.gain.setValueAtTime(vol,ctx.currentTime+start); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur); o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur); };
    play(800,0,0.05,0.5);play(600,0.02,0.08,0.4);play(800,0.12,0.05,0.4);play(600,0.14,0.08,0.3);play(800,0.28,0.05,0.3);play(600,0.30,0.06,0.2);
  }catch{}
}
function playAirhorn(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [233,311,466,554].forEach(freq=>{ const o=ctx.createOscillator(),g=ctx.createGain(),dist=ctx.createWaveShaper(); const curve=new Float32Array(256); for(let i=0;i<256;i++) curve[i]=i<128?-1:1; dist.curve=curve; o.connect(dist);dist.connect(g);g.connect(ctx.destination); o.type="sawtooth";o.frequency.value=freq; g.gain.setValueAtTime(0,ctx.currentTime); g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05); g.gain.setValueAtTime(0.3,ctx.currentTime+1.5); g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.0); o.start();o.stop(ctx.currentTime+2.0); });
  }catch{}
}

let db, roomCode="", roomData={}, screen="name";
let userName=localStorage.getItem("dt_name")||"";
let isAdmin=false, currentTab="session", adminSection="prices";
let drinks=DEFAULT_DRINKS.map(d=>({...d}));
let adminPass="Sydneybuses1977";
let stdWarnAt=4, spendWarnAt=50;
let happyHour=isHappyHour(), prevHappy=isHappyHour(), showHappyNotif=false;
let spinning=false, spinResult=null;
let nowDate=new Date();
const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
if(userName) screen="home";

const fbApp=initializeApp(FIREBASE_CONFIG);
db=getDatabase(fbApp);

function subscribeRoom(){ onValue(ref(db,`rooms/${roomCode}`),snap=>{ roomData=snap.val()||{}; render(); }); }
function createRoom(){ if(!userName.trim()) return; roomCode=genCode(); set(ref(db,`rooms/${roomCode}`),{ created:Date.now(), members:{[userName]:{joinedAt:Date.now(),shoutCount:0}}, drinkLog:{}, shoutOrder:[userName], currentShout:0, roundCount:0, shoutHistory:{} }); subscribeRoom(); screen="session"; render(); }
function joinRoom(code){ if(!userName.trim()||!code.trim()) return; roomCode=code.toUpperCase().trim(); update(ref(db,`rooms/${roomCode}/members/${userName}`),{joinedAt:Date.now(),shoutCount:0}); subscribeRoom(); screen="session"; render(); }
function addDrink(drinkId){ const d=drinks.find(x=>x.id===drinkId); if(!d) return; push(ref(db,`rooms/${roomCode}/drinkLog`),{ drinkId, member:userName, timestamp:Date.now(), price:happyHour?d.happyPrice:d.price, calories:d.calories, std:d.std, done:false }); }
function markDone(key){ playCowbell(); const e=roomData?.drinkLog?.[key]; update(ref(db,`rooms/${roomCode}/drinkLog/${key}`),{done:!e?.done}); }
function nextShout(){ const order=roomData.shoutOrder||[], curr=roomData.currentShout||0, nextIdx=(curr+1)%order.length, shouter=order[curr], newRound=nextIdx===0?(roomData.roundCount||0)+1:(roomData.roundCount||0); update(ref(db,`rooms/${roomCode}`),{currentShout:nextIdx,roundCount:newRound}); update(ref(db,`rooms/${roomCode}/members/${shouter}`),{shoutCount:((roomData.members?.[shouter]?.shoutCount)||0)+1}); set(ref(db,`rooms/${roomCode}/shoutHistory/${Date.now()}`),{name:shouter,time:Date.now()}); }
function spinForFirst(){ const order=roomData.shoutOrder||[]; if(order.length<2) return; spinning=true; spinResult=null; render(); let count=0; const iv=setInterval(()=>{ spinResult=order[Math.floor(Math.random()*order.length)]; count++; if(count>20){ clearInterval(iv); const winner=order[Math.floor(Math.random()*order.length)]; spinResult=winner; spinning=false; update(ref(db,`rooms/${roomCode}`),{currentShout:order.indexOf(winner)}); } render(); },100); }
function addMember(name){ if(!name.trim()) return; const order=[...(roomData?.shoutOrder||[]),name.trim()]; update(ref(db,`rooms/${roomCode}/members/${name.trim()}`),{joinedAt:Date.now(),shoutCount:0}); update(ref(db,`rooms/${roomCode}`),{shoutOrder:order}); }
function removeMember(name){ const order=(roomData?.shoutOrder||[]).filter(n=>n!==name); remove(ref(db,`rooms/${roomCode}/members/${name}`)); update(ref(db,`rooms/${roomCode}`),{shoutOrder:order}); }
function clearRoom(){ update(ref(db,`rooms/${roomCode}`),{drinkLog:{},roundCount:0,currentShout:0,shoutHistory:{}}); }
function lastDrinks(){ playAirhorn(); push(ref(db,`rooms/${roomCode}/drinkLog`),{drinkId:"LASTDRINKS",member:"SYSTEM",timestamp:Date.now(),price:0,calories:0,std:0,done:false}); }

function getLog(){ return roomData?.drinkLog?Object.entries(roomData.drinkLog):[]; }
function getMyLog(){ return getLog().filter(([,e])=>e.member===userName&&e.drinkId!=="LASTDRINKS"); }
function getAllLog(){ return getLog().filter(([,e])=>e.drinkId!=="LASTDRINKS"); }
function totals(log){ return log.reduce((a,[,e])=>({spent:a.spent+e.price,cal:a.cal+e.calories,std:a.std+e.std}),{spent:0,cal:0,std:0}); }
function getShoutHistory(){ return roomData?.shoutHistory?Object.values(roomData.shoutHistory).sort((a,b)=>b.time-a.time):[]; }

function showPriceEdit(drink){
  const container=document.getElementById("price-edit-container");
  container.style.display="block"; container.innerHTML="";
  const overlay=document.createElement("div"); overlay.className="overlay";
  overlay.onclick=(e)=>{ if(e.target===overlay){ container.style.display="none"; container.innerHTML=""; }};
  const popup=document.createElement("div"); popup.className="price-popup";

  const emoji=document.createElement("div"); emoji.className="price-popup-emoji"; emoji.textContent=drink.emoji;
  const name=document.createElement("div"); name.className="price-popup-name"; name.textContent=drink.name;
  const hint=document.createElement("div"); hint.className="price-popup-hint"; hint.textContent="Update prices for this venue";

  const regField=document.createElement("div"); regField.className="price-popup-field";
  const regLabel=document.createElement("div"); regLabel.className="price-popup-label"; regLabel.textContent="Regular Price";
  const regWrap=document.createElement("div"); regWrap.className="price-popup-input-wrap";
  const regDollar=document.createElement("span"); regDollar.className="price-popup-dollar"; regDollar.textContent="$";
  const regInp=document.createElement("input"); regInp.className="price-popup-input"; regInp.type="number"; regInp.step="0.10"; regInp.min="0"; regInp.value=drink.price.toFixed(2);
  regWrap.appendChild(regDollar); regWrap.appendChild(regInp); regField.appendChild(regLabel); regField.appendChild(regWrap);

  let happyInp=null;
  const happyField=document.createElement("div"); happyField.className="price-popup-field"; happyField.style.borderColor="#059669";
  if(["hahn","tooheysnew","tooheyold","vb","xxxx"].includes(drink.id)){
    const happyLabel=document.createElement("div"); happyLabel.className="price-popup-label"; happyLabel.style.color="#059669"; happyLabel.textContent="Happy Hour Price";

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){ if(k==="style"&&typeof v==="object") Object.assign(e.style,v); else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v); else e.setAttribute(k,v); }
  for(const c of children){ if(typeof c==="string") e.appendChild(document.createTextNode(c)); else if(c) e.appendChild(c); }
  return e;
}
